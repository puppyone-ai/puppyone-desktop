name: Desktop Internal Build

on:
  workflow_dispatch:
    inputs:
      upload_r2:
        description: Upload release files to Cloudflare R2
        type: boolean
        default: true
      r2_prefix:
        description: Base R2 object prefix
        type: string
        default: desktop/internal/mac
      create_github_release:
        description: Create a GitHub prerelease with the same files
        type: boolean
        default: true
      release_tag:
        description: Optional release tag. Defaults to v<package version>-internal.<run number>
        type: string
        default: ""

permissions:
  contents: write

jobs:
  mac:
    name: Signed and notarized macOS package
    runs-on: macos-latest
    env:
      R2_BUCKET: puppyone-desktop
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare notarization credentials
        run: |
          set -euo pipefail
          : "${CSC_LINK:?Set MACOS_CSC_LINK}"
          : "${CSC_KEY_PASSWORD:?Set MACOS_CSC_KEY_PASSWORD}"
          : "${APPLE_API_KEY_CONTENT:?Set APPLE_API_KEY_P8}"
          : "${APPLE_API_KEY_ID:?Set APPLE_API_KEY_ID}"
          : "${APPLE_API_ISSUER:?Set APPLE_API_ISSUER}"
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "${APPLE_API_KEY_CONTENT}" > "${KEY_PATH}"
          chmod 600 "${KEY_PATH}"
          echo "APPLE_API_KEY=${KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Build signed and notarized macOS package
        run: npm run dist:mac

      - name: Verify signature, Gatekeeper and notarization ticket
        run: |
          set -euo pipefail
          APP_PATH="$(find release -type d -name '*.app' -print -quit)"
          : "${APP_PATH:?Packaged app was not found}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl --assess --type execute --verbose=4 "${APP_PATH}"
          # stapler supports app/pkg/dmg, not zip. The zipped app is covered by
          # the strict codesign/spctl checks above before it is archived.
          for artifact in release/*.dmg; do
            [ -e "${artifact}" ] || continue
            xcrun stapler validate "${artifact}"
          done

      - name: Resolve release metadata
        id: release_meta
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          if [ -n "${INPUT_RELEASE_TAG}" ]; then
            TAG="${INPUT_RELEASE_TAG}"
          else
            TAG="v${VERSION}-internal.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=puppyone ${VERSION} internal ${GITHUB_RUN_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Upload GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: puppyone-macos-signed-${{ github.run_number }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub prerelease
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: ${{ steps.release_meta.outputs.name }}
          R2_PREFIX: ${{ inputs.r2_prefix }}
        run: |
          set -euo pipefail
          files=()
          for pattern in release/*.dmg release/*.zip release/*.yml release/*.blockmap; do
            for file in $pattern; do
              [ -e "${file}" ] && files+=("${file}")
            done
          done
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found."
            exit 1
          fi

          NOTES="$(mktemp)"
          {
            echo "Developer ID signed and Apple-notarized internal macOS build."
            echo
            echo "Commit: ${GITHUB_SHA}"
            echo "R2 version prefix: ${R2_PREFIX}/${RELEASE_TAG}"
            echo "R2 latest prefix: ${R2_PREFIX}/latest"
          } > "${NOTES}"
          gh release create "${RELEASE_TAG}" "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "${RELEASE_NAME}" \
            --notes-file "${NOTES}" \
            --prerelease

      - name: Upload to Cloudflare R2
        if: ${{ inputs.upload_r2 }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_PREFIX: ${{ inputs.r2_prefix }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          set -euo pipefail
          : "${AWS_ACCESS_KEY_ID:?Set the R2_ACCESS_KEY_ID repository secret}"
          : "${AWS_SECRET_ACCESS_KEY:?Set the R2_SECRET_ACCESS_KEY repository secret}"
          : "${CLOUDFLARE_ACCOUNT_ID:?Set the CLOUDFLARE_ACCOUNT_ID repository secret}"
          : "${RELEASE_TAG:?Release tag is required}"
          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi

          VERSION_PREFIX="${R2_PREFIX}/${RELEASE_TAG}"
          LATEST_PREFIX="${R2_PREFIX}/latest"

          aws s3 sync release "s3://${R2_BUCKET}/${VERSION_PREFIX}" \
            --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.yml" \
            --include "*.blockmap" \
            --cache-control "public, max-age=300"

          aws s3 sync release "s3://${R2_BUCKET}/${LATEST_PREFIX}" \
            --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --delete \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.yml" \
            --include "*.blockmap" \
            --cache-control "public, max-age=300"

          for file in release/*.dmg release/*.zip; do
            [ -e "${file}" ] || continue
            name="$(basename "${file}")"
            ext="${name##*.}"
            arch="mac"
            if [[ "${name}" == *"-arm64."* ]]; then
              arch="arm64"
            elif [[ "${name}" == *"-x64."* ]]; then
              arch="x64"
            elif [[ "${name}" == *"-universal."* ]]; then
              arch="universal"
            fi
            aws s3 cp "${file}" "s3://${R2_BUCKET}/${LATEST_PREFIX}/puppyone-latest-${arch}.${ext}" \
              --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --content-type "application/octet-stream" \
              --cache-control "public, max-age=300"
          done

          if [ -f release/latest-mac.yml ]; then
            aws s3 cp release/latest-mac.yml "s3://${R2_BUCKET}/${VERSION_PREFIX}/latest-mac.yml" \
              --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --content-type "text/yaml" \
              --cache-control "no-cache"
            aws s3 cp release/latest-mac.yml "s3://${R2_BUCKET}/${LATEST_PREFIX}/latest-mac.yml" \
              --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com" \
              --content-type "text/yaml" \
              --cache-control "no-cache"
          fi
