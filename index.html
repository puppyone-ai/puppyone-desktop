<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>puppyone</title>
    <script>
      (() => {
        try {
          const storedTheme = window.localStorage.getItem("puppyone.desktop.theme");
          const systemDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
          const dark = storedTheme === "dark" || (storedTheme !== "light" && systemDark);
          if (dark) document.documentElement.dataset.initialTheme = "dark";
        } catch {
          // Keep the static first-paint background when storage is unavailable.
        }
      })();
    </script>
    <style>
      :root {
        background: #f1eadf;
        color-scheme: light;
      }

      :root[data-initial-theme="dark"] {
        background: #0e0e0e;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body,
      #root:empty {
        overflow: hidden;
        background: #f1eadf;
      }

      :root[data-initial-theme="dark"] body,
      :root[data-initial-theme="dark"] #root:empty {
        background: #0e0e0e;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
